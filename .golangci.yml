# golangci-lint configuration (v2)
# Docs: https://golangci-lint.run/usage/configuration/
version: "2"

linters:
  enable:
    - gosec
    - misspell
  disable:
    - depguard
    - errorlint
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Fprint
    gosec:
      excludes:
        - G107
        - G114
        - G204
        - G304
        - G306
    govet:
      disable:
        - fieldalignment
        - shadow
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gosec
        path: _test\.go
      # Session/state cookies set HttpOnly + SameSiteLax; Secure is conditional on
      # https (off for local http dev), which G124 can't model. Text match keeps
      # this valid across golangci-lint versions (gosec excludes enum is versioned).
      - linters:
          - gosec
        path: api/web/auth_handlers\.go
        text: "G124"
    paths:
      - vendor
      - hack
      - third_party$
      - builtin$
      - examples$

formatters:
  enable:
    - gofmt
  exclusions:
    paths:
      - third_party$
      - builtin$
      - examples$
