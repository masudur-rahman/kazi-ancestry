{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "kazi-ancestry.fullname" . }}
  labels:
    {{- include "kazi-ancestry.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- if .Values.gateway.create }}
    - name: {{ include "kazi-ancestry.fullname" . }}
    {{- else }}
    {{- range .Values.gateway.parentRefs }}
    - name: {{ required "gateway.parentRefs[].name is required when gateway.create is false" .name }}
      {{- with .namespace }}
      namespace: {{ . }}
      {{- end }}
      {{- with .sectionName }}
      sectionName: {{ . }}
      {{- end }}
    {{- end }}
    {{- end }}
  hostnames:
    - {{ .Values.gateway.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "kazi-ancestry.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
