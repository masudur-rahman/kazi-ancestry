{{- if and .Values.seed.enabled (not .Values.seed.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kazi-ancestry.fullname" . }}-seed
  labels:
    {{- include "kazi-ancestry.labels" . | nindent 4 }}
type: Opaque
stringData:
  family.local.json: |
    {{- .Values.seed.data | nindent 4 }}
{{- end }}
