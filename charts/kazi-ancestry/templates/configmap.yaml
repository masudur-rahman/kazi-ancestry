{{- $seedPath := .Values.config.seedPath }}
{{- if .Values.seed.enabled }}
{{- $seedPath = "/app/seed/family.local.json" }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kazi-ancestry.fullname" . }}
  labels:
    {{- include "kazi-ancestry.labels" . | nindent 4 }}
data:
  # The app's native YAML config (CONFIG_FILE points here). Secrets are NOT
  # rendered here — PGPASSWORD, GOOGLE_CLIENT_SECRET and SESSION_SECRET arrive
  # via env from the Secret and override these (omitted) fields at load time.
  kazi-ancestry.yaml: |
    database:
      postgres:
        name: {{ .Values.database.name | quote }}
        host: {{ .Values.database.host | quote }}
        port: {{ .Values.database.port | quote }}
        user: {{ .Values.database.user | quote }}
        sslmode: {{ .Values.database.sslmode | quote }}
    server:
      host: "0.0.0.0"
      port: {{ .Values.service.targetPort }}
      webDir: web
      metricsPort: {{ .Values.metrics.port }}
    auth:
      googleClientId: {{ .Values.oauth.clientId | quote }}
      redirectUrl: {{ include "kazi-ancestry.redirectUrl" . | quote }}
      admins:
        {{- toYaml .Values.config.admins | nindent 8 }}
      allowlist:
        {{- toYaml .Values.config.allowlist | nindent 8 }}
    privacy:
      guestNamesOnly: {{ .Values.config.guestNamesOnly }}
    {{- if $seedPath }}
    seedPath: {{ $seedPath | quote }}
    {{- end }}
