# Default values for kazi-ancestry.
# Secrets are intentionally empty here — supply them via a private values file
# (`-f secrets.yaml`, kept out of git) or a pre-created Secret (see `existingSecret`).

replicaCount: 1

image:
  repository: masudjuly02/kazi-ancestry
  # Defaults to the chart appVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi

service:
  type: ClusterIP
  port: 80          # service port
  targetPort: 5294  # container port (the app listens here)

# Prometheus metrics are served on a separate internal port (/metrics), exposed
# on the Service but NOT routed by the Gateway — scrapeable only in-cluster.
metrics:
  port: 9090

# ── Application config (non-secret → ConfigMap) ───────────────────────────────
config:
  env: production          # ENV (production enables zap prod logging)
  guestNamesOnly: false    # privacy: logged-out guests see only names when true
  admins:                  # emails that can edit + review
    - masudjuly02@gmail.com
  allowlist: []            # emails that can suggest (others are read-only viewers)
  seedPath: ""             # SEED_PATH; empty -> in-image sample (see `seed` below)

# ── Database (NOT provisioned by this chart — point at your Postgres) ──────────
database:
  host: ""                 # PGHOST (required)
  port: "5432"             # PGPORT
  name: kazi               # PGDATABASE
  user: postgres           # PGUSER
  sslmode: require         # PGSSLMODE
  password: ""             # PGPASSWORD → Secret (or use existingSecret)

# ── Google OAuth ──────────────────────────────────────────────────────────────
oauth:
  clientId: ""             # GOOGLE_CLIENT_ID (not secret → ConfigMap)
  redirectUrl: ""          # OAUTH_REDIRECT_URL; empty -> https://{gateway.hostname}/auth/callback
  clientSecret: ""         # GOOGLE_CLIENT_SECRET → Secret
  sessionSecret: ""        # SESSION_SECRET → Secret (openssl rand -base64 32)

# Reference a pre-created Secret (with keys PGPASSWORD, GOOGLE_CLIENT_SECRET,
# SESSION_SECRET) instead of rendering one from the values above. Recommended
# for production so secrets never pass through Helm values.
existingSecret: ""

# ── Gateway API (HTTPRoute) ───────────────────────────────────────────────────
# Disabled by default; enable per-release (and set parentRefs) on clusters running
# Gateway API. Prefer this over the Ingress below where Gateway API is available.
gateway:
  enabled: false
  hostname: family.mrahman.xyz
  # Attach to an existing (shared) Gateway. Fill name/namespace for your cluster.
  parentRefs:
    - name: ""
      namespace: ""
      sectionName: ""      # optional listener name
  # Set true to also create a dedicated Gateway in this release.
  create: false
  gatewayClassName: ""     # used only when create: true
  tls:
    secretName: ""         # TLS cert secret; used only when create: true

# ── Ingress (alternative to Gateway API; disabled by default) ─────────────────
# Use on clusters without Gateway API. Don't enable both gateway and ingress.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: family.mrahman.xyz
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - hosts: [family.mrahman.xyz]
  #   secretName: family-mrahman-xyz-tls

# ── Optional: seed real data on first boot (kept out of the image) ────────────
# When enabled, the family.local.json is mounted at /app/seed and SEED_PATH points
# at it. Disabled -> seeds the in-image fictional sample. Provide the data one of
# two ways:
#   - existingSecret: name of a pre-created Secret with a `family.local.json` key
#     (recommended for GitOps — keep it SOPS-encrypted, real data out of values).
#   - data: inline family.local.json contents (rendered into a Secret by the chart;
#     fine for local/dev, but ends up in plain Helm values).
# existingSecret wins when both are set.
seed:
  enabled: false
  existingSecret: ""
  data: ""

# ── Health probes ─────────────────────────────────────────────────────────────
probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 15
  readiness:
    path: /healthz
    initialDelaySeconds: 3
    periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}

# ── Optional add-ons (all disabled by default) ────────────────────────────────

# Horizontal Pod Autoscaler.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 0   # 0 disables the memory metric

# PodDisruptionBudget (set one of minAvailable / maxUnavailable).
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""

# NetworkPolicy. When enabled, supply ingress/egress rules (empty = deny-all in
# the listed policyTypes). allowDNS adds an egress rule for cluster DNS.
networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress
  allowDNS: true
  ingress: []   # list of NetworkPolicyIngressRule (e.g. from your gateway namespace)
  egress: []    # list of NetworkPolicyEgressRule (e.g. to your Postgres host)

# Prometheus Operator ServiceMonitor — scrapes the internal metrics port.
serviceMonitor:
  enabled: false
  path: /metrics
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
