name: Release

on:
  push:
    tags:
      - "*.*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write # required to push images to GHCR

jobs:
  release:
    name: Build & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Primary registry: GitHub Container Registry. Uses the repo owner + the
      # built-in GITHUB_TOKEN, so it works with no extra secrets/variables.
      - name: Publish image to GitHub Container Registry
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          DOCKER_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.actor }}
        run: |
          echo "${DOCKER_TOKEN}" | docker login ghcr.io --username "${USERNAME}" --password-stdin
          make release

      # Optional mirror: Docker Hub. Skipped until you set the repo variables
      # (Settings -> Secrets and variables -> Actions):
      #   vars.DOCKERHUB_NAMESPACE, vars.DOCKERHUB_USERNAME, secrets.DOCKERHUB_TOKEN
      - name: Publish image to Docker Hub
        if: ${{ vars.DOCKERHUB_NAMESPACE != '' }}
        env:
          REGISTRY: ${{ vars.DOCKERHUB_NAMESPACE }}
          SRC_REG: ghcr.io/${{ github.repository_owner }}
          DOCKER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
        run: |
          echo "${DOCKER_TOKEN}" | docker login --username "${USERNAME}" --password-stdin
          make release
